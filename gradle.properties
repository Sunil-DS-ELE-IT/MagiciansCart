# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.code.style=official

# Suppress the Kotlin sourceSets DSL error as suggested by the error log
android.disallowKotlinSourceSets=false
# Allow the experimental Kotlin source set graph if using newer AGP versions
android.experimental.allowKotlinSourceSetGraph=true